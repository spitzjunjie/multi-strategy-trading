# ============================================================
# 历史回测说明
# ============================================================
#
# 【重要】本文件已不再使用 GitHub Actions 运行历史回测！
#
# 原因：
# 1. 历史回测耗时长，超出 GitHub Actions 6小时限制
# 2. 历史回测应在 Codex 本地/云端沙箱运行
#
# ============================================================
# 
# 任务分工：
# ┌─────────────────────────────────────────────────────────┐
# │  GitHub Actions        │  Codex 本地/云端                │
# ├─────────────────────────────────────────────────────────┤
# │  每日单次回测          │  历史回测（多日）              │
# │  （已上线策略）        │  新策略开发                    │
# │  ~5分钟               │  按需执行                      │
# └─────────────────────────────────────────────────────────┘
#
# ============================================================
#
# Codex 本地/云端运行历史回测命令：
#
# 【方式1】Codex 执行（推荐）
#   cd stock_intelligence/multi_strategy_trading
#   codex exec --profile m21 --dangerously-bypass-approvals-and-sandbox --skip-git-repo-check "运行历史回测"
#
# 【方式2】批处理脚本
#   python .github/scripts/codex_batch_backtest.py --batch all
#   python .github/scripts/codex_batch_backtest.py --batch 1
#
# 【方式3】直接运行
#   python backtest_history.py --source tushare
#   python backtest_history.py --source akshare
#
# ============================================================
#
# 策略批次定义：
#   批次1: 护城河选股,质量因子选股,GARP成长,股权激励,周期股择时
#   批次2: 回购信号,龙虎榜跟风,打板接力,次新股,尾盘抢筹
#   批次3: 集合竞价,戴维斯双击,股东户数变化,困境反转,涨停封单
#   批次4: 跌停撬板,限售解禁博弈,游资席位跟踪,ETF折溢价套利,网格交易,可转债双低,可转债下修博弈
#   批次all: 全部新策略
#
# ============================================================
#
# 回测完成后操作：
#   1. 合并数据: python proper_merge.py
#   2. 推送到 GitHub: git add output/ && git commit -m "历史回测完成" && git push
#
# ============================================================
